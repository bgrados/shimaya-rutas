</div>
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden border border-outline-variant/20">

</div>
</div>

<main class="max-w-2xl mx-auto px-6 pt-12">
<!-- Editorial Header -->
<div class="mb-12">
<span class="font-label text-primary text-[10px] uppercase tracking-[0.3em] mb-2 block">Administración de Red</span>
<h2 class="font-headline text-4xl font-extrabold tracking-tighter text-on-surface">Nueva Ubicación</h2>
</div>
<!-- Form Section -->
<div class="space-y-10">
<!-- Input: Name -->
<div class="group">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant mb-3 block">Nombre de la Ubicación</label>
<div class="bg-surface-container-lowest p-1 rounded-md transition-all duration-300 focus-within:ring-1 focus-within:ring-primary/30">
<input class="w-full bg-transparent border-none text-on-surface placeholder:text-surface-container-highest font-body py-4 px-4 focus:ring-0" placeholder="Ej. Centro de Distribución Norte" type="text"/>
</div>
</div>
<!-- Input: Address -->
<div class="group">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant mb-3 block">Dirección Fiscal / Operativa</label>
<div class="bg-surface-container-lowest p-1 rounded-md transition-all duration-300 focus-within:ring-1 focus-within:ring-primary/30">
<input class="w-full bg-transparent border-none text-on-surface placeholder:text-surface-container-highest font-body py-4 px-4 focus:ring-0" placeholder="Calle Industrial #405, Zona Industrial" type="text"/>
</div>
</div>
<!-- Map Pin Location Picker -->
<div class="group">
<div class="flex justify-between items-end mb-3">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant block">Geolocalización (PIN)</label>
<span class="font-label text-[10px] text-tertiary">COORD: 19.4326° N, 99.1332° W</span>
</div>
<div class="relative w-full aspect-video rounded-md overflow-hidden bg-surface-container-low">
<img class="w-full h-full object-cover grayscale opacity-50" data-alt="Dark stylized map interface with shipping routes" data-location="Mexico City" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDrZomKjfJMchyrsvhdCxKqixmxBlviwLecpbrUbkDpjnLYvEpaar9KxrOoEH-fdpp_gcg_YQ7qzSu7gbj9_6nqJ4u9LzaHRMcJgasjs9saKJxEbiyijjsIphEdcbiE8j9MOKUBst8sIHd5dfzVAcXUYTgJJF4opgegjJMaXc59K25YjCfXTtra15fcl5krIf5F1ECoAJ3hmgVTFdzVH8lT90wxvXjYl3osI455OILG81k_V0JSCDZZylcKp0idxNdMw2t_LJ_-Hx0"/>

<div class="absolute -bottom-2 left-1/2 -translate-x-1/2 w-4 h-1 bg-black/40 blur-sm rounded-full"></div>
</div>
</div>
<!-- Map Controls Overlay -->
<div class="absolute top-4 right-4 flex flex-col gap-2">
<button class="w-10 h-10 bg-surface-container-highest text-on-surface flex items-center justify-center rounded-md hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined">add</span>
</button>
<button class="w-10 h-10 bg-surface-container-highest text-on-surface flex items-center justify-center rounded-md hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined">remove</span>
</button>
</div>
</div>
<p class="mt-3 font-body text-xs text-on-surface-variant/60 italic">Arrastra el mapa para ajustar la posición exacta de entrega.</p>
</div>
<!-- Input: Phone -->
<div class="group">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant mb-3 block">Teléfono de Contacto</label>
<div class="bg-surface-container-lowest p-1 rounded-md transition-all duration-300 focus-within:ring-1 focus-within:ring-primary/30 flex items-center">
<span class="pl-4 pr-2 text-on-surface-variant font-label">+52</span>
<input class="w-full bg-transparent border-none text-on-surface placeholder:text-surface-container-highest font-body py-4 px-2 focus:ring-0" placeholder="55 1234 5678" type="tel"/>
</div>
</div>

<div class="pt-6 flex flex-col gap-4">
<button class="bg-machined text-on-primary-fixed w-full py-5 rounded-md font-headline font-extrabold uppercase tracking-widest text-lg shadow-[0_4px_24px_rgba(255,180,172,0.2)] active:scale-95 duration-200">
                    Guardar Ubicación
                </button>
<button class="text-on-surface-variant font-label text-xs uppercase tracking-widest py-4 hover:text-on-surface transition-colors">

</div>

</div>

<span class="material-symbols-outlined">location_on</span>
<span class="font-space-grotesk text-[10px] uppercase tracking-widest mt-1">Ubicaciones</span>
</div>
