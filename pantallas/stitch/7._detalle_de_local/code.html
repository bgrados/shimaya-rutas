<!DOCTYPE html>

<html class="dark" lang="es"><head>

            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-glass {
            background: rgba(19, 19, 19, 0.6);
            backdrop-filter: blur(20px);
        }
        .route-gradient {
            background: linear-gradient(45deg, #FFB4AC, #FF544C);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary">
<!-- TopAppBar -->
<header class="bg-[#131313] fixed top-0 z-50 flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<button class="text-[#E2E2E2] hover:bg-[#353535] transition-colors p-2 rounded-lg active:scale-95 duration-200">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline text-lg font-bold tracking-tight text-[#FFB4AC] uppercase">SHIMAYA RUTAS</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest overflow-hidden border border-outline-variant/20">
<img class="w-full h-full object-cover" data-alt="User profile avatar of a logistics controller" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDCA-_FDxcBifO9chGHEH11C0eCJtyol2JDiaDn3i2cPaIcik37GVr0lOuvDTqaZ2788eFoXNrchWNjGZhzTwSwtokE_FeQ65jcvlBGUxpFPFJqqocNLXXnKj2EfBWQf6uy9-Nphafu5xcjPmgXahQqEZ-0ckAlqDrg7Zsr6g6Vs4y75sbVX3Ydr7VDWtrZpcBJ2qn3t0noHVUCtDGZBOS6EEfc9OF_3y1a8qBPSYQ9njkXOoV3BlZdELN70n-noYSMZ_BLZYcDQkQ"/>
</div>
</header>
<main class="pt-20 pb-32 px-4 max-w-2xl mx-auto">
<!-- Store Header Section -->
<section class="mb-8 mt-4">
<div class="flex items-baseline gap-2 mb-2">
<span class="font-label text-primary text-xs tracking-widest uppercase">Punto de Entrega #04</span>
<div class="h-[1px] flex-grow bg-outline-variant/15"></div>
</div>
<h2 class="font-headline text-3xl font-extrabold text-on-surface mb-2 leading-none tracking-tight">TIENDA CENTRAL - SURCO</h2>
<div class="space-y-3">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-primary mt-1" data-icon="location_on">location_on</span>
<p class="font-body text-on-surface-variant text-sm">Av. Primavera 1234, Santiago de Surco, Lima 15038</p>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="phone">phone</span>
<p class="font-label text-on-surface text-sm font-medium tracking-wide">+51 987 654 321</p>
</div>
</div>
</section>
<!-- Map Preview - Bento Style -->
<div class="relative w-full h-48 rounded-xl overflow-hidden mb-8 shadow-2xl group">
<img class="w-full h-full object-cover grayscale opacity-60 group-hover:grayscale-0 transition-all duration-700 scale-110" data-alt="Map showing delivery location in Surco district" data-location="Lima, Peru" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAm9tmY37k-gSRrMk_muh8P8PaDTjTI_QM3Qo3BeJ04lKJF-joPmwUe6guZMf2pWOUa9glDC7Xu3Qe8dCkEhWtCPZ2kBpSxPa_LKGLX1iDFQJo6x4fdoNmZs41-wjfKmMgQoKvmgLiNwG_uDbGRWEFlR855_f_9AY-ooZpq3OXvjBsuO0iHXOXtnW1egE-8PbJX_w2j5gnBRHJy3Je-ucLGIeXuhMYPQDHkcDU0QMKv6AbOGYUL8zJyJSzRqC5fJhwDn3Wt0yCl3OI"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
<div class="absolute top-4 right-4 bg-glass p-2 rounded-lg border border-outline-variant/20">
<span class="material-symbols-outlined text-tertiary" data-icon="near_me">near_me</span>
</div>
<div class="absolute bottom-4 left-4 flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-primary animate-pulse"></div>
<span class="font-label text-xs uppercase tracking-tighter text-on-surface font-bold">En rango de entrega</span>
</div>
</div>
<!-- Field Actions Grid -->
<div class="grid grid-cols-2 gap-3 mb-10">
<!-- Arrived -->
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-low rounded-xl hover:bg-surface-container-highest transition-all group border-b-2 border-transparent active:scale-95 duration-150">
<span class="material-symbols-outlined text-primary text-3xl mb-2 group-hover:scale-110 transition-transform" data-icon="location_on">location_on</span>
<span class="font-label text-xs font-bold uppercase tracking-widest text-on-surface">Llegué</span>
</button>
<!-- Photo -->
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-low rounded-xl hover:bg-surface-container-highest transition-all group active:scale-95 duration-150">
<span class="material-symbols-outlined text-tertiary text-3xl mb-2 group-hover:scale-110 transition-transform" data-icon="photo_camera">photo_camera</span>
<span class="font-label text-xs font-bold uppercase tracking-widest text-on-surface">Foto</span>
</button>
<!-- Observation -->
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-low rounded-xl hover:bg-surface-container-highest transition-all group active:scale-95 duration-150">
<span class="material-symbols-outlined text-on-surface-variant text-3xl mb-2 group-hover:scale-110 transition-transform" data-icon="edit_note">edit_note</span>
<span class="font-label text-xs font-bold uppercase tracking-widest text-on-surface">Observación</span>
</button>
<!-- Not Attended -->
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-low rounded-xl hover:bg-surface-container-highest transition-all group active:scale-95 duration-150">
<span class="material-symbols-outlined text-error text-3xl mb-2 group-hover:scale-110 transition-transform" data-icon="cancel">cancel</span>
<span class="font-label text-xs font-bold uppercase tracking-widest text-on-surface">No atendido</span>
</button>
</div>
<!-- Finish Delivery Section -->
<div class="space-y-4">
<button class="w-full h-20 route-gradient rounded-xl flex items-center justify-center gap-3 shadow-[0_8px_32px_rgba(255,84,76,0.3)] active:scale-[0.98] transition-all">
<span class="material-symbols-outlined text-on-primary-fixed text-3xl" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-headline text-xl font-extrabold uppercase tracking-tighter text-on-primary-fixed">Finalizar Entrega</span>
</button>
<p class="text-center font-label text-[10px] text-on-surface-variant/50 uppercase tracking-[0.2em]">Confirmar entrega actualiza inventario en tiempo real</p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 bg-[#131313]/60 backdrop-blur-xl shadow-[0_-4px_24px_rgba(255,180,172,0.08)] z-50">
<!-- Rutas -->
<a class="flex flex-col items-center justify-center bg-[#FF544C] text-[#FFFFFF] rounded-xl p-2 scale-105 transition-all" href="#">
<span class="material-symbols-outlined" data-icon="route">route</span>
<span class="font-label text-[10px] uppercase tracking-widest mt-1">Rutas</span>
</a>
<!-- Mapa -->
<a class="flex flex-col items-center justify-center text-[#E2E2E2] opacity-60 p-2 hover:opacity-100 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="map">map</span>
<span class="font-label text-[10px] uppercase tracking-widest mt-1">Mapa</span>
</a>
<!-- Historial -->
<a class="flex flex-col items-center justify-center text-[#E2E2E2] opacity-60 p-2 hover:opacity-100 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label text-[10px] uppercase tracking-widest mt-1">Historial</span>
</a>
<!-- Reportes -->
<a class="flex flex-col items-center justify-center text-[#E2E2E2] opacity-60 p-2 hover:opacity-100 transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="bar_chart">bar_chart</span>
<span class="font-label text-[10px] uppercase tracking-widest mt-1">Reportes</span>
</a>
</nav>
</body></html>
